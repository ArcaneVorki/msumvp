name: Weekly MVP Spend Check

on:
  schedule:
    # Thursday 13:00 UTC — starts a new weekly cycle if one is due.
    - cron: "0 13 * * 4"
    # Every 6 hours — resumes an in-progress cycle. No-ops if the last
    # cycle already finished and isn't due for a new one yet.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

# Ensures only one run of this workflow executes at a time. If a scheduled
# trigger fires while a previous run is still going (or queued), it waits
# instead of running in parallel — critical here, since two runs touching
# the same checkpoint file at once would corrupt it.
concurrency:
  group: mvp-weekly-cycle
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    # Safety net under GitHub's 6-hour hard limit — the script budgets
    # itself to stop well before this, but this catches it if that logic
    # ever fails to trigger.
    timeout-minutes: 340
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run MVP spend check (resumable)
        run: node scripts/fetch-mvp-resumable.js

      - name: Commit and push progress
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "MVP spend check progress: $(date -u +%Y-%m-%dT%H-%M-%SZ)"
          git push
