<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MVP Spend Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262a33;
    --text: #e6e8ec;
    --muted: #9aa1ad;
    --red: #ef4444;
    --green: #22c55e;
    --amber: #f59e0b;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    margin: 0;
    padding: 24px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 4px; }
  .info-note { color: var(--muted); font-size: 12px; margin: 0 0 4px; }
  .info-note:last-of-type { margin-bottom: 24px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .card .value { font-size: 26px; font-weight: 600; margin-top: 4px; }
  .card.big .value { font-size: 40px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .panel h2 { font-size: 14px; margin: 0 0 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  tr:hover td { background: #1d212b; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .empty { color: var(--muted); padding: 24px; text-align: center; }
  canvas { max-height: 340px; }

  .char-cell { display: flex; align-items: center; gap: 10px; }
  .char-avatar-frame {
    width: 36px; height: 36px; border-radius: 8px;
    background: #0f1115; border: 1px solid var(--border);
    overflow: hidden; position: relative; flex-shrink: 0;
  }
  .char-avatar-frame img {
    position: absolute; top: 50%; left: 50%;
    width: 170%; height: 170%; transform: translate(-50%, -50%);
    object-fit: cover;
  }
  .char-avatar-frame .placeholder {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px;
  }
  .char-name { font-weight: 600; font-size: 13px; }
  .char-extra { color: var(--muted); font-size: 11px; }
  .char-link { color: inherit; text-decoration: none; }
  .char-link:hover .char-name { text-decoration: underline; color: var(--accent); }

  .rank-pill { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  .rank-Inactive { background: rgba(154,161,173,0.15); color: var(--muted); }
  .rank-Bronze   { background: rgba(205,127,50,0.20); color: #e0975a; }
  .rank-Silver   { background: rgba(192,192,192,0.20); color: #cfd3d8; }
  .rank-Gold     { background: rgba(234,179,8,0.20); color: #eab308; }
  .rank-Diamond  { background: rgba(56,189,248,0.20); color: #38bdf8; }
  .rank-Black    { background: rgba(167,139,250,0.22); color: #a78bfa; }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .tab-btn.active {
    background: rgba(99,102,241,0.15);
    border-color: var(--accent);
    color: #c7c9ff;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .tier-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .tier-filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    cursor: pointer;
  }
  .tier-filter-btn.active { border-color: var(--accent); color: var(--text); background: rgba(99,102,241,0.12); }

  .search-input {
    width: 100%;
    max-width: 420px;
    background: #0f1115;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
</style>
</head>
<body>

<h1>MVP Spend Tracker</h1>
<div class="subtitle" id="subtitle">Loading data…</div>
<div class="info-note">Data refresh every Saturday. 100k Neso = 1 NXPC = 1 Point.</div>
<div class="info-note">Marketplace sell not counted - Buys only count 5%</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tabRankBtn" onclick="switchTab('rank')">Rank Distribution</button>
  <button class="tab-btn" id="tabSpendingBtn" onclick="switchTab('spending')">Spending Ranking</button>
  <button class="tab-btn" id="tabTotalBtn" onclick="switchTab('total')">Total Spending</button>
</div>

<div class="tab-panel active" id="rankPanel">
  <div class="cards" id="rankCards"></div>
  <div class="panel">
    <h2>Rank distribution over time</h2>
    <canvas id="rankChart"></canvas>
  </div>
</div>

<div class="tab-panel" id="spendingPanel">
  <div class="panel">
    <h2>Spending ranking (highest to lowest)</h2>
    <input type="text" id="spendingSearchInput" class="search-input" placeholder="Search by address or character name..." oninput="setSpendingSearch(this.value)" />
    <div class="tier-filter-bar" id="tierFilterBar"></div>
    <div id="spendingTableWrap"></div>
  </div>
</div>

<div class="tab-panel" id="totalPanel">
  <div class="cards" id="totalCards"></div>
  <div class="panel">
    <h2>Spend by tier (last 13 weeks)</h2>
    <div class="cards" id="tierSpendCards"></div>
  </div>
  <div class="panel">
    <h2>Total NESO spent (last 13 weeks)</h2>
    <canvas id="tierSpendChart"></canvas>
  </div>
</div>

<script>
async function loadJSON(path) {
  // Bust both CDN and browser caching so we always see the latest committed data
  const bustedPath = `${path}?t=${Date.now()}`;
  const res = await fetch(bustedPath, { cache: "no-store" });
  if (!res.ok) throw new Error(`Failed to load ${path}: ${res.status}`);
  return res.json();
}

function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleString();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function formatNumber(val) {
  const n = Number(val);
  if (Number.isNaN(n)) return String(val);
  return n.toLocaleString();
}

// spendNeso values are large raw integers — display them in millions for readability
function formatNeso(val) {
  if (val == null) return "—";
  const n = Number(val);
  if (Number.isNaN(n)) return String(val);
  const millions = n / 1_000_000;
  return `${millions.toLocaleString(undefined, { maximumFractionDigits: 2 })}M NESO`;
}

function charPageUrl(characterAssetKey) {
  return `https://msu.io/navigator/character/${characterAssetKey}`;
}

function switchTab(tab) {
  const tabs = {
    rank: { btn: "tabRankBtn", panel: "rankPanel" },
    spending: { btn: "tabSpendingBtn", panel: "spendingPanel" },
    total: { btn: "tabTotalBtn", panel: "totalPanel" },
  };
  for (const key in tabs) {
    document.getElementById(tabs[key].btn).classList.toggle("active", key === tab);
    document.getElementById(tabs[key].panel).classList.toggle("active", key === tab);
  }
}

function avatarHtmlFor(player) {
  if (!player?.imageUrl) {
    return `<div class="char-avatar-frame"><div class="placeholder">?</div></div>`;
  }
  return `<div class="char-avatar-frame"><img src="${player.imageUrl}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<div class=&quot;placeholder&quot;>?</div>'" /></div>`;
}

// Cached across renders so the tier filter buttons can re-render without re-fetching
let cachedRankedResults = [];
let cachedWalletToPlayer = {};
let activeTierFilter = "Black";
let activeSpendingSearch = "";

const TIER_FILTER_OPTIONS = ["Black", "Diamond", "Gold", "Silver", "Bronze", "Inactive", "All"];

function renderTierFilterBar() {
  document.getElementById("tierFilterBar").innerHTML = TIER_FILTER_OPTIONS.map(t => `
    <button class="tier-filter-btn ${t === activeTierFilter ? "active" : ""}" onclick="setTierFilter('${t}')">${t}</button>
  `).join("");
}

function setTierFilter(tier) {
  activeTierFilter = tier;
  renderTierFilterBar();
  renderSpendingTable();
}

function setSpendingSearch(value) {
  activeSpendingSearch = value.trim().toLowerCase();
  renderSpendingTable();
}

function renderSpendingTable() {
  let filtered = activeTierFilter === "All"
    ? cachedRankedResults
    : cachedRankedResults.filter(r => r.rank === activeTierFilter);

  if (activeSpendingSearch) {
    filtered = filtered.filter(r => {
      const player = cachedWalletToPlayer[r.address];
      const addrMatch = r.address.toLowerCase().includes(activeSpendingSearch);
      const nameMatch = player?.characterName?.toLowerCase().includes(activeSpendingSearch);
      return addrMatch || nameMatch;
    });
  }

  if (filtered.length === 0) {
    document.getElementById("spendingTableWrap").innerHTML =
      `<div class="empty">No wallets match this filter.</div>`;
    return;
  }

  const rows = filtered.map((r, i) => {
    const player = cachedWalletToPlayer[r.address];
    const charCell = player
      ? `
        <a class="char-link" href="${charPageUrl(player.characterAssetKey)}" target="_blank" rel="noopener noreferrer">
          <div class="char-cell">
            ${avatarHtmlFor(player)}
            <div>
              <div class="char-name">${escapeHtml(player.characterName || "Unknown")}</div>
              <div class="char-extra">Rank #${player.rank ?? "—"}</div>
            </div>
          </div>
        </a>
      `
      : `<span class="char-extra">No character match</span>`;

    const combatPower = player?.attackPower ? formatNumber(player.attackPower) : "—";

    return `
      <tr>
        <td>${i + 1}</td>
        <td>${charCell}</td>
        <td class="mono">${r.address}</td>
        <td>${combatPower}</td>
        <td><span class="rank-pill rank-${r.rank}">${r.rank}</span></td>
        <td>${formatNeso(r.spendNeso)}</td>
      </tr>
    `;
  }).join("");

  document.getElementById("spendingTableWrap").innerHTML = `
    <table>
      <thead>
        <tr><th>#</th><th>Character</th><th>Address</th><th>Combat Power</th><th>Tier</th><th>Spend (last 13 weeks)</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

async function main() {
  let manifest, latest;
  try {
    manifest = await loadJSON("data/manifest.json");
    latest = await loadJSON("data/latest.json");
  } catch (err) {
    document.getElementById("subtitle").textContent = "Waiting for first run…";
    document.getElementById("rankCards").innerHTML =
      `<div class="empty">No data yet. Once the weekly GitHub Action runs at least once, results will show up here.</div>`;
    return;
  }

  document.getElementById("subtitle").textContent =
    `Last checked: ${fmtDate(latest.checkedAt)} · ${latest.totalWallets} wallets tracked`;

  // --- Cross-repo player lookup (character image/name) from msuban ---
  let walletToPlayer = {};
  try {
    const players = await loadJSON(
      "https://raw.githubusercontent.com/ArcaneVorki/msuban/main/data/players.json"
    );
    for (const p of players) {
      if (!p.walletAddr) continue;
      // Keep the highest-ranked (first) character per wallet
      if (!walletToPlayer[p.walletAddr]) walletToPlayer[p.walletAddr] = p;
    }
  } catch (err) {
    // msuban's players.json not reachable — tables just show addresses without character info
  }

  // ===================== TAB 1: RANK DISTRIBUTION =====================
  const rankOrder = ["Black", "Diamond", "Gold", "Silver", "Bronze", "Inactive"];
  const counts = latest.rankCounts || {};
  document.getElementById("rankCards").innerHTML = rankOrder.map(r => `
    <div class="card">
      <div class="label">${r}</div>
      <div class="value"><span class="rank-pill rank-${r}">${counts[r] ?? 0}</span></div>
    </div>
  `).join("");

  const histDates = manifest.slice(-52); // cap at last ~1 year of weeks
  const histRecords = await Promise.all(
    histDates.map(d => loadJSON(`data/history/${d}.json`).catch(() => null))
  );

  const labels = [];
  const seriesByRank = { Black: [], Diamond: [], Gold: [], Silver: [], Bronze: [], Inactive: [] };
  histRecords.forEach((rec, i) => {
    if (!rec) return;
    labels.push(histDates[i]);
    for (const r of rankOrder) {
      seriesByRank[r].push(rec.rankCounts?.[r] ?? 0);
    }
  });

  const rankColors = {
    Black: "#a78bfa", Diamond: "#38bdf8", Gold: "#eab308",
    Silver: "#cfd3d8", Bronze: "#e0975a", Inactive: "#9aa1ad",
  };

  try {
    new Chart(document.getElementById("rankChart"), {
      type: "line",
      data: {
        labels,
        datasets: rankOrder.map(r => ({
          label: r,
          data: seriesByRank[r],
          borderColor: rankColors[r],
          backgroundColor: rankColors[r] + "22",
          tension: 0.25,
          fill: false,
        })),
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: "#e6e8ec" } } },
        scales: {
          x: { ticks: { color: "#9aa1ad" }, grid: { color: "#262a33" } },
          y: { ticks: { color: "#9aa1ad" }, grid: { color: "#262a33" }, beginAtZero: true },
        },
      },
    });
  } catch (err) {
    console.error("Rank chart failed:", err);
    document.getElementById("rankChart").outerHTML = `<div class="empty">Chart failed to render: ${err.message}</div>`;
  }

  // ===================== TAB 2: SPENDING RANKING =====================
  const rankedResults = (latest.results || [])
    .filter(r => r.spendNeso != null)
    .slice()
    .sort((a, b) => Number(BigInt(b.spendNeso) - BigInt(a.spendNeso)));

  cachedRankedResults = rankedResults;
  cachedWalletToPlayer = walletToPlayer;
  renderTierFilterBar();
  renderSpendingTable();

  // ===================== TAB 3: TOTAL SPENDING =====================
  function sumTopN(results, n) {
    const sorted = (results || [])
      .filter(r => r.spendNeso != null)
      .slice()
      .sort((a, b) => Number(BigInt(b.spendNeso) - BigInt(a.spendNeso)));
    let sum = 0n;
    for (const r of sorted.slice(0, n)) {
      try { sum += BigInt(r.spendNeso); } catch {}
    }
    return sum;
  }

  const top10Leviathans = sumTopN(latest.results, 10);

  document.getElementById("totalCards").innerHTML = `
    <div class="card big">
      <div class="label">Total NESO spent (last 13 weeks)</div>
      <div class="value">${formatNeso(latest.totalSpendNeso)}</div>
    </div>
    <div class="card">
      <div class="label">Raw total (NESO)</div>
      <div class="value">${formatNumber(latest.totalSpendNeso)}</div>
    </div>
    <div class="card">
      <div class="label">Top 10 Leviathans (combined)</div>
      <div class="value">${formatNeso(top10Leviathans.toString())}</div>
    </div>
  `;

  // Spend broken down by tier, this week
  const tierTotals = { Black: 0n, Diamond: 0n, Gold: 0n, Silver: 0n, Bronze: 0n, Inactive: 0n };
  for (const r of (latest.results || [])) {
    if (r.rank && r.spendNeso != null) {
      try {
        tierTotals[r.rank] += BigInt(r.spendNeso);
      } catch {
        // malformed spendNeso — skip
      }
    }
  }
  document.getElementById("tierSpendCards").innerHTML = rankOrder.map(r => `
    <div class="card">
      <div class="label"><span class="rank-pill rank-${r}">${r}</span></div>
      <div class="value">${formatNeso(tierTotals[r].toString())}</div>
    </div>
  `).join("") + `
    <div class="card">
      <div class="label">Top 10 Leviathans</div>
      <div class="value">${formatNeso(top10Leviathans.toString())}</div>
    </div>
  `;

  // Spend by tier over time, plus overall total and Top 10 Leviathans —
  // all combined into one chart. Reuses the same histRecords/histDates
  // fetched for Tab 1.
  const tierSpendLabels = [];
  const tierSpendSeries = { Black: [], Diamond: [], Gold: [], Silver: [], Bronze: [], Inactive: [] };
  const top10Series = [];
  const totalSeries = [];
  histRecords.forEach((rec, i) => {
    if (!rec) return;
    tierSpendLabels.push(histDates[i]);
    const weekTotals = { Black: 0n, Diamond: 0n, Gold: 0n, Silver: 0n, Bronze: 0n, Inactive: 0n };
    for (const r of (rec.results || [])) {
      if (r.rank && r.spendNeso != null) {
        try { weekTotals[r.rank] += BigInt(r.spendNeso); } catch {}
      }
    }
    for (const r of rankOrder) {
      tierSpendSeries[r].push(Number(weekTotals[r]) / 1_000_000); // in millions for chart readability
    }
    top10Series.push(Number(sumTopN(rec.results, 10)) / 1_000_000);
    totalSeries.push(Number(rec.totalSpendNeso || 0) / 1_000_000);
  });

  try {
    new Chart(document.getElementById("tierSpendChart"), {
      type: "line",
      data: {
        labels: tierSpendLabels,
        datasets: [
          {
            label: "Total spend",
            data: totalSeries,
            borderColor: "#22c55e",
            backgroundColor: "rgba(34,197,94,0.12)",
            borderWidth: 3,
            tension: 0.25,
            fill: true,
          },
          ...rankOrder.map(r => ({
            label: r,
            data: tierSpendSeries[r],
            borderColor: rankColors[r],
            backgroundColor: rankColors[r] + "22",
            tension: 0.25,
            fill: false,
          })),
          {
            label: "Top 10 Leviathans",
            data: top10Series,
            borderColor: "#ec4899",
            backgroundColor: "#ec489922",
            borderDash: [6, 4],
            tension: 0.25,
            fill: false,
          },
        ],
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: "#e6e8ec" } } },
        scales: {
          x: { ticks: { color: "#9aa1ad" }, grid: { color: "#262a33" } },
          y: {
            ticks: { color: "#9aa1ad" }, grid: { color: "#262a33" }, beginAtZero: true,
            title: { display: true, text: "Millions of NESO", color: "#9aa1ad" },
          },
        },
      },
    });
  } catch (err) {
    console.error("Combined spend chart failed:", err);
    document.getElementById("tierSpendChart").outerHTML = `<div class="empty">Chart failed to render: ${err.message}</div>`;
  }
}

main();
</script>
</body>
</html>
